<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Splunk Query Helper</title>
</head>

<body>
    <script src="script.js"></script>
    <div class="container">
        <h2>Splunk Time Formatter</h2>

        <label>1. Paste Splunk Timestamp:</label>
        <input type="text" id="tsInput" placeholder="4/19/26 11:19:21 PM or 23:19:21"
            title="Accepts both 12-hour (AM/PM) and 24-hour formats">
        <button class="init-btn" onclick="mainConvert()">Initialize Range Logic</button>

        <div class="range-controls" id="rangeControls">
            <label>2. Events Before or After:</label>
            <div class="flex-row">
                <button class="modifier-btn" id="modBefore" onclick="setModifier('before')">Before</button>
                <button class="modifier-btn" id="modAfter" onclick="setModifier('after')">After</button>
                <button class="modifier-btn active" id="modPlusMinus" onclick="setModifier('plusMinus')">+/-</button>
            </div>

            <label>3. Nearby Events Offset:</label>
            <div class="flex-row">
                <input type="number" id="offsetValue" value="1" style="margin:0; flex: 1;">
                <select id="offsetUnit" style="margin:0; flex:1.5;" onchange="calculateRange()">
                    <option value="m" selected>minute(s)</option>
                    <option value="h">hour(s)</option>
                    <option value="d">day(s)</option>
                </select>
                <button class="apply-btn" onclick="calculateRange()">Apply</button>
            </div>
        </div>

        <div id="result-container" style="display:none;">
            <div class="panel-header">
                <span>Query Parameters</span>
                <button id="copyBtn" onclick="copyToClipboard()">Copy</button>
            </div>
            <div id="result"></div>
        </div>
    </div>
</body>

</html>
