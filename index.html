<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Splunk Query Helper - Fixed</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; justify-content: center; padding: 20px; background-color: #0d1117; color: white; }
        .container { background: #161b22; padding: 2rem; border-radius: 12px; border: 1px solid #30363d; width: 100%; max-width: 550px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        h2 { color: #58a6ff; margin-top: 0; }
        label { font-size: 0.9rem; color: #8b949e; display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #30363d; border-radius: 6px; background-color: #0d1117; color: white; font-size: 1rem; outline: none; }
        .primary-btn { width: 100%; padding: 12px; background-color: #1f6feb; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; font-weight: bold; }
        .modifier-btn { background-color: #21262d; color: #c9d1d9; border: 1px solid #30363d; padding: 10px; flex: 1; cursor: pointer; border-radius: 6px; }
        .modifier-btn.active { background-color: #1f6feb; color: white; border-color: #58a6ff; }
        .range-controls { display: none; margin-top: 20px; padding-top: 20px; border-top: 1px solid #30363d; }
        .range-controls.show { display: block; }
        .flex-row { display: flex; gap: 10px; align-items: center; margin-bottom: 15px;}
        #result-container { margin-top: 25px; background: #0d1117; border-radius: 8px; border: 1px solid #30363d; }
        .panel-header { background: #161b22; padding: 8px 15px; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; }
        #result { padding: 20px; font-family: monospace; color: #79c0ff; word-break: break-all; }
        #copyBtn { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; padding: 5px 12px; border-radius: 4px; cursor: pointer; }
        #copyBtn.success { background: #238636; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h2>Splunk Time Formatter</h2>
    <label>Paste Timestamp (e.g., 4/19/26 11:19:21.304 PM):</label>
    <input type="text" id="tsInput" placeholder="4/19/26 11:19:21.304 PM">
    <button class="primary-btn" onclick="mainConvert()">Initialize Range Logic</button>
    
    <div class="range-controls" id="rangeControls">
        <div class="flex-row">
            <button class="modifier-btn" id="modBefore" onclick="setModifier('before')">Before</button>
            <button class="modifier-btn" id="modAfter" onclick="setModifier('after')">After</button>
            <button class="modifier-btn active" id="modPlusMinus" onclick="setModifier('plusMinus')">+/-</button>
        </div>
        <div class="flex-row">
            <input type="number" id="offsetValue" value="5" oninput="calculateRange()">
            <select id="offsetUnit" onchange="calculateRange()">
                <option value="s" selected>second(s)</option>
                <option value="m">minute(s)</option>
                <option value="h">hour(s)</option>
            </select>
        </div>
    </div>

    <div id="result-container" style="display:none;">
        <div class="panel-header">
            <span>Splunk Search Terms</span>
            <button id="copyBtn" onclick="copyToClipboard()">Copy</button>
        </div>
        <div id="result"></div>
    </div>
</div>

<script>
    let currentModifier = 'plusMinus';

    // 1. IMPROVED PARSING: Manually parses "4/19/26 11:19:21.304 PM"
    function parseCustomDate(str) {
        const regex = /^(\d{1,2})\/(\d{1,2})\/(\d{2,4})\s+(\d{1,2}):(\d{1,2}):(\d{1,2})\.?(\d{0,3})\s+(AM|PM)$/i;
        const match = str.trim().match(regex);
        
        if (!match) return new Date(str); // Fallback to native if regex fails

        let [_, month, day, year, hours, minutes, seconds, ms, ampm] = match;
        
        year = year.length === 2 ? "20" + year : year;
        hours = parseInt(hours);
        if (ampm.toUpperCase() === "PM" && hours < 12) hours += 12;
        if (ampm.toUpperCase() === "AM" && hours === 12) hours = 0;

        return new Date(year, month - 1, day, hours, minutes, seconds);
    }

    function formatSplunkDate(dateObj) {
        const pad = (n) => n.toString().padStart(2, '0');
        return `${pad(dateObj.getMonth()+1)}/${pad(dateObj.getDate())}/${dateObj.getFullYear()}:${pad(dateObj.getHours())}:${pad(dateObj.getMinutes())}:00`;
    }

    function setModifier(mod) {
        currentModifier = mod;
        document.querySelectorAll('.modifier-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('mod' + mod.charAt(0).toUpperCase() + mod.slice(1)).classList.add('active');
        calculateRange();
    }

    function mainConvert() {
        const date = parseCustomDate(document.getElementById('tsInput').value);
        if (!isNaN(date.getTime())) {
            document.getElementById('rangeControls').classList.add('show');
            calculateRange();
        } else {
            alert("Format not recognized. Please use M/D/YY HH:MM:SS AM/PM");
        }
    }

    function calculateRange() {
        const baseDate = parseCustomDate(document.getElementById('tsInput').value);
        if (isNaN(baseDate.getTime())) return;

        const val = parseFloat(document.getElementById('offsetValue').value) || 0;
        const unit = document.getElementById('offsetUnit').value;
        const mult = { s: 1000, m: 60000, h: 3600000 }[unit];
        const offsetMs = val * mult;

        let start, end;
        if (currentModifier === 'before') {
            start = new Date(baseDate.getTime() - offsetMs);
            end = baseDate;
        } else if (currentModifier === 'after') {
            start = baseDate;
            end = new Date(baseDate.getTime() + offsetMs);
        } else {
            start = new Date(baseDate.getTime() - offsetMs);
            end = new Date(baseDate.getTime() + offsetMs);
        }

        document.getElementById('result-container').style.display = 'block';
        document.getElementById('result').innerText = `earliest=${formatSplunkDate(start)} latest=${formatSplunkDate(end)}`;
    }

    async function copyToClipboard() {
        await navigator.clipboard.writeText(document.getElementById('result').innerText);
        const btn = document.getElementById('copyBtn');
        btn.innerText = "Copied!";
        btn.classList.add('success');
        setTimeout(() => { btn.innerText = "Copy"; btn.classList.remove('success'); }, 2000);
    }
</script>
</body>
</html>
