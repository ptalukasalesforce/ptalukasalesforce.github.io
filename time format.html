<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Splunk Time Range Generator</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; justify-content: center; padding: 20px; background-color: #1a1e26; color: white; }
        .container { background: #22272e; padding: 2.5rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); width: 100%; max-width: 550px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0 16px 0; box-sizing: border-box; border: 1px solid #444; border-radius: 4px; background-color: #1a1e26; color: white; font-size: 1rem;}
        .primary-btn { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1.1rem; font-weight: bold; }
        .modifier-btn { background-color: transparent; color: #40a9ff; border: 1px solid #40a9ff; padding: 8px; flex: 1; cursor: pointer; border-radius: 4px; }
        .modifier-btn.active { background-color: #40a9ff; color: #fff; }
        .range-controls { display: none; margin-top: 20px; padding-top: 20px; border-top: 1px solid #444; }
        .range-controls.show { display: block; }
        .flex-row { display: flex; gap: 10px; align-items: center; margin-bottom: 15px;}
        #result-container { margin-top: 20px; padding: 15px; background: #161b22; border-radius: 4px; border: 1px solid #30363d; }
        #result { font-family: monospace; color: #58a6ff; word-break: break-all; font-size: 1.1rem; }
        .copy-hint { font-size: 0.8rem; color: #8b949e; margin-top: 10px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <h2>Splunk Time Formatter</h2>
    
    <label>1. Paste Timestamp from Splunk Event:</label>
    <input type="text" id="tsInput" placeholder="4/19/26 11:19:21.304 PM">
    <button class="primary-btn" onclick="mainConvert()">Initialize</button>
    
    <div class="range-controls" id="rangeControls">
        <h4>2. Define Range for Query</h4>
        <div class="flex-row">
            <button class="modifier-btn" id="modBefore" onclick="setModifier('before')">Before</button>
            <button class="modifier-btn" id="modAfter" onclick="setModifier('after')">After</button>
            <button class="modifier-btn active" id="modPlusMinus" onclick="setModifier('plusMinus')">+/-</button>
        </div>

        <div class="flex-row">
            <input type="number" id="offsetValue" value="5">
            <select id="offsetUnit">
                <option value="s" selected>second(s)</option>
                <option value="m">minute(s)</option>
                <option value="h">hour(s)</option>
            </select>
        </div>
        
        <button class="primary-btn" style="background-color: #238636;" onclick="calculateRange()">Generate Splunk Range</button>
    </div>

    <div id="result-container" style="display:none;">
        <span class="copy-hint">Splunk Search Terms:</span>
        <div id="result"></div>
    </div>
</div>

<script>
    const UNIT_S = 1000, UNIT_M = 60000, UNIT_H = 3600000;
    const pad = (num) => num.toString().padStart(2, '0');
    let currentModifier = 'plusMinus';

    function formatSplunkDate(dateObj) {
        if (isNaN(dateObj.getTime())) return null;
        const m = pad(dateObj.getMonth() + 1);
        const d = pad(dateObj.getDate());
        const y = dateObj.getFullYear();
        const h = pad(dateObj.getHours());
        const min = pad(dateObj.getMinutes());
        return `${m}/${d}/${y}:${h}:${min}:00`;
    }

    function setModifier(mod) {
        currentModifier = mod;
        document.querySelectorAll('.modifier-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('mod' + mod.charAt(0).toUpperCase() + mod.slice(1)).classList.add('active');
    }

    function mainConvert() {
        const input = document.getElementById('tsInput').value;
        if (new Date(input).getTime()) {
            document.getElementById('rangeControls').classList.add('show');
            calculateRange();
        } else {
            alert("Please enter a valid timestamp first.");
        }
    }

    function calculateRange() {
        const input = document.getElementById('tsInput').value;
        const baseDate = new Date(input);
        const offsetValue = parseFloat(document.getElementById('offsetValue').value) || 0;
        const unit = document.getElementById('offsetUnit').value;
        
        let offsetMs = offsetValue * (unit === 's' ? UNIT_S : unit === 'm' ? UNIT_M : UNIT_H);
        let earliestDate, latestDate;

        const baseMs = baseDate.getTime();

        if (currentModifier === 'before') {
            earliestDate = new Date(baseMs - offsetMs);
            latestDate = baseDate;
        } else if (currentModifier === 'after') {
            earliestDate = baseDate;
            latestDate = new Date(baseMs + offsetMs);
        } else {
            earliestDate = new Date(baseMs - offsetMs);
            latestDate = new Date(baseMs + offsetMs);
        }

        const eStr = formatSplunkDate(earliestDate);
        const lStr = formatSplunkDate(latestDate);

        document.getElementById('result-container').style.display = 'block';
        document.getElementById('result').innerText = `earliest=${eStr} latest=${lStr}`;
    }
</script>

</body>
</html>
